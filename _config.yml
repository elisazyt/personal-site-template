# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole site, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.github_repo }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Your Name
description: Placeholder tagline — swap this for your own one-line intro.
url: "https://elisazyt.github.io" # the base hostname & protocol for your site
baseurl: "/personal-site-template" # the repo name, since this is a project site not the root user site
github_repo: personal-site-template
github_username: elisazyt # TODO: replace with your real GitHub username

# Social links — TODO: fill these in with your real usernames/handles.
# Left blank on purpose: a placeholder like "yourusername" can resolve to a
# real stranger's account, so the includes fall back to "#" until these are set.
social_link: twitter
social_username: ""
linkedin_username: ""
email_address: ""

# Set theme color here
# Choose from: black (default), blue, gray, magenta, orange, red, white, and yellow.
theme_color: light

# Build settings
markdown: kramdown

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/
