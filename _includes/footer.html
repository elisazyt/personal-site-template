<div class="container mx-auto clearfix mt-2 mt-lg-4 px-2">
  <div class="border-top-thick">
    <p class="col-8 sm-width-full left py-2 mb-0">This template is maintained by <a class="text-accent" href="https://github.com/{{ site.github_username }}">{{ site.github_username }}</a></p>
    <ul class="list-reset right clearfix sm-width-full py-2 mb-2 mb-lg-0 footer-icons">
      <li class="inline-block mr-2">
        {% include email.html %}
      </li>
      <li class="inline-block mr-2">
        {% include linkedin.html %}
      </li>
      <li class="inline-block mr-2">
        {% include github.html %}
      </li>
      <li class="inline-block">
        <a class="footer-star" href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}" target="_blank" rel="noopener noreferrer">★ star</a>
      </li>
    </ul>
  </div>
</div>
